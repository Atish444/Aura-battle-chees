<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA BATTLE CHESS</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        #chessArena { width: 90%; max-width: 400px; margin: 20px auto; border: 2px solid red; display: none; }
        .shake-effect { animation: hit 0.5s; }
        @keyframes hit { 50% { transform: scale(1.05); background: #300; } }
    </style>
</head>
<body>
    <h1>AURA BATTLE CHESS</h1>
    <button id="startBtn" style="padding: 20px; font-size: 20px;">START BATTLE</button>
    <div id="chessArena"><div id="myBoard"></div></div>

    <script>
        const moveSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
        let game = new Chess();
        let board = null;

        document.getElementById('startBtn').onclick = function() {
            this.style.display = 'none';
            document.getElementById('chessArena').style.display = 'block';
            
            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
                onDrop: function(s, t) {
                    let m = game.move({from: s, to: t, promotion: 'q'});
                    if (m === null) return 'snapback';
                    moveSfx.play().catch(()=>{});
                    if (game.in_checkmate()) {
                        document.getElementById('chessArena').className = 'shake-effect';
                        alert("CHECKMATE!");
                    }
                }
            });
        };
    </script>
</body>
</html>
