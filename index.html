<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA BATTLE CHESS | Epic Anime Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #1a0000 0%, #030000 70%, #000000 100%); 
            color: #fff; 
            font-family: 'Impact', sans-serif; 
            text-align: center;
            overflow-x: hidden;
        }
        h1 { font-size: 36px; text-shadow: 0 0 25px #ff0000; margin: 20px 0 10px 0; font-style: italic; }
        
        .menu-btn { 
            background: linear-gradient(45deg, #cc0000, #4a0000); 
            color: white; 
            border: 2px solid #ff2a2a; 
            padding: 15px 40px; 
            font-size: 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
            font-family: 'Impact', sans-serif;
            margin-top: 50px;
        }

        #chessArena { 
            display: none; 
            width: 95%; 
            max-width: 380px; 
            margin: 10px auto; 
            border: 3px solid #ff2a2a; 
            background: #000;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 0 25px #ff0000;
            box-sizing: border-box;
        }

        /* Pure CSS Grid Board - No external images needed */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid #111;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        /* Dark Anime Board Colors */
        .light-tile { background-color: #1c1c1c; }
        .dark-tile { background-color: #4a0000; }
        
        .cell.selected { background-color: #ffaa00 !important; }

        /* Pieces Styling */
        .white-piece { color: #ffffff; text-shadow: 0 0 10px #00d2ff; }
        .black-piece { color: #ff3333; text-shadow: 0 0 15px #ff0000; }

        .shake-effect { animation: hit 0.4s ease-out; }
        @keyframes hit { 
            50% { transform: scale(1.06); background-color: rgba(255,0,0,0.3); } 
        }
        #status { font-family: Arial, sans-serif; font-size: 14px; color: #ff6666; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>⚔️ AURA BATTLE CHESS ⚔️</h1>
    <p style="color: #ff6666; letter-spacing: 2px; margin: 0;">PLAYER: ATISH</p>

    <button id="startBtn" class="menu-btn">START BATTLE 🤖</button>

    <div id="chessArena">
        <div id="status">Your Turn - White Warriors</div>
        <div id="htmlBoard" class="board-grid"></div>
        <button class="menu-btn" style="padding: 8px 20px; font-size: 14px; margin: 15px auto 5px auto;" onclick="location.reload()">SURRENDER</button>
    </div>

    <script>
        const moveSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
        const captureSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2763/2763-84.wav');
        const finalSlashSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/1188/1188-84.wav');

        const chess = new Chess();
        const boardElement = document.getElementById('htmlBoard');
        let selectedSquare = null;

        // Unicode map for text pieces
        const piecesSymbols = {
            'p': '♙', 'r': '♖', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚'
        };

        document.getElementById('startBtn').onclick = function() {
            this.style.display = 'none';
            document.getElementById('chessArena').style.display = 'block';
            // Unlock audio engine for mobile browsers
            moveSfx.play().then(() => { moveSfx.pause(); moveSfx.currentTime = 0; }).catch(()=>{});
            renderBoard();
        };

        function renderBoard() {
            boardElement.innerHTML = '';
            const boardState = chess.board();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    const squareCode = String.fromCharCode(97 + c) + (8 - r);
                    
                    cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light-tile' : 'dark-tile');
                    cell.dataset.square = squareCode;

                    const piece = boardState[r][c];
                    if (piece) {
                        cell.innerText = piecesSymbols[piece.type] || '';
                        cell.className += piece.color === 'w' ? ' white-piece' : ' black-piece';
                    }

                    if (selectedSquare === squareCode) {
                        cell.classList.add('selected');
                    }

                    cell.onclick = () => handleSquareClick(squareCode);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleSquareClick(square) {
            if (chess.game_over()) return;

            if (selectedSquare === null) {
                const piece = chess.get(square);
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    renderBoard();
                }
            } else {
                const move = chess.move({ from: selectedSquare, to: square, promotion: 'q' });
                selectedSquare = null;

                if (move) {
                    if (move.captured) captureSfx.play().catch(()=>{});
                    else moveSfx.play().catch(()=>{});

                    renderBoard();
                    checkMatchEnd();

                    if (!chess.game_over()) {
                        document.getElementById('status').innerText = "Shadow AI thinking...";
                        setTimeout(makeBotMove, 600);
                    }
                } else {
                    const piece = chess.get(square);
                    if (piece && piece.color === 'w') {
                        selectedSquare = square;
                    }
                    renderBoard();
                }
            }
        }

        function makeBotMove() {
            const moves = chess.moves();
            if (moves.length === 0) return;

            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            const moveDetails = chess.move(randomMove);

            if (moveDetails && moveDetails.captured) captureSfx.sfx.play().catch(()=>{});
            else moveSfx.play().catch(()=>{});

            document.getElementById('status').innerText = "Your Turn - White Warriors";
            renderBoard();
            checkMatchEnd();
        }

        function checkMatchEnd() {
            if (chess.in_checkmate()) {
                finalSlashSfx.play().catch(()=>{});
                document.getElementById('chessArena').className = 'shake-effect';
                document.getElementById('status').innerText = "💥 CRITICAL CHECKMATE! YOU WON!";
                setTimeout(() => alert("💥 CRITICAL CHECKMATE! You Won Aura Battle Chess!"), 400);
            } else if (chess.in_check()) {
                document.getElementById('status').innerText = "⚠️ WARNING: IN CHECK!";
            }
        }
    </script>
</body>
</html>
