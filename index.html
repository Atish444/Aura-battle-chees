<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA BATTLE CHESS | Epic Anime Arena</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root {
            --aura-red: 0 0 25px #ff0000, 0 0 50px #990000;
            --aura-gold: 0 0 25px #ffd700, 0 0 50px #ff6600;
        }
        
        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a0000 0%, #030000 70%, #000000 100%);
            color: #fff;
            font-family: 'Impact', sans-serif;
            overflow-x: hidden;
        }

        /* 👑 Top Profile Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 2px solid #ff2a2a;
            background: rgba(0, 0, 0, 0.8);
        }

        .coins-box {
            color: #ffd700;
            text-shadow: var(--aura-gold);
        }

        /* 🏠 Menu Styling */
        .main-menu {
            margin-top: 50px;
            text-align: center;
        }
        
        h1 {
            font-size: 38px;
            text-shadow: var(--aura-red);
            font-style: italic;
            letter-spacing: 2px;
        }

        .menu-btn {
            background: linear-gradient(45deg, #cc0000, #4a0000);
            color: white;
            border: 2px solid #ff2a2a;
            padding: 15px 40px;
            font-size: 18px;
            margin: 15px auto;
            cursor: pointer;
            border-radius: 8px;
            width: 85%;
            max-width: 300px;
            display: block;
            font-family: 'Impact', sans-serif;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
        }

        /* ♟️ Original Anime Dark Board Styling - REVERTED & FIXED */
        .game-zone {
            display: none;
            margin: 20px auto;
            width: 94%;
            max-width: 390px;
            background: #0a0000;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ff2a2a;
            box-shadow: var(--aura-red);
            box-sizing: border-box;
        }

        #myBoard {
            width: 100%;
            margin: 0 auto;
            border: 4px solid #111;
        }

        /* Asli Dark Anime Theme Board Colours */
        .black-3c85d { background-color: #4a0000 !important; } /* Neon Dark Red */
        .white-1e1d7 { background-color: #1c1c1c !important; } /* Sleek Charcoal Dark */

        /* Zoom shaking effect strictly restricted to Checkmate */
        .shake-effect { animation: hitFlash 0.5s ease-out; }
        @keyframes hitFlash {
            50% { transform: scale(1.05); background-color: rgba(255,0,0,0.2); }
        }

        #status {
            font-family: sans-serif;
            font-size: 14px;
            color: #ff6666;
            margin: 10px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>PLAYER: <span style="color: #ff2a2a;">ATISH</span></div>
        <div class="coins-box">🪙 100</div>
    </div>

    <div id="menuScene" class="main-menu">
        <h1>⚔️ AURA BATTLE CHESS ⚔️</h1>
        <button class="menu-btn" onclick="startBattleground()">START BATTLE 🤖</button>
    </div>

    <div class="game-zone" id="chessArena">
        <div id="status">White Warriors, make your move...</div>
        <div id="myBoard"></div>
        <button class="menu-btn" style="padding: 8px 20px; font-size: 14px; margin-top: 15px;" onclick="location.reload()">SURRENDER</button>
    </div>

    <script>
        // Kadak Anime Sounds
        const moveSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav'); 
        const captureSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2763/2763-84.wav'); 
        const finalSlashAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1188/1188-84.wav'); 

        let game = new Chess();
        let board = null;

        function startBattleground() {
            document.getElementById("menuScene").style.display = "none";
            document.getElementById("chessArena").style.display = "block";
            
            // Unblocking audio engine
            moveSound.play().then(() => { moveSound.pause(); moveSound.currentTime = 0; }).catch(()=>{});

            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                // Full Color Real Pieces High-Quality Cloud CDN
                pieceTheme: 'https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/img/chesspieces/wikipedia/{piece}.png',
                onDrop: onDrop
            });
            $(window).resize(board.resize);
        }

        function onDrop(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            if (move.captured) { captureSound.play().catch(()=>{}); } 
            else { moveSound.play().catch(()=>{}); }

            if (game.in_checkmate()) {
                finalSlashAudio.play().catch(()=>{});
                $('#chessArena').addClass('shake-effect');
                document.getElementById('status').innerText = "💥 CRITICAL CHECKMATE!";
                setTimeout(() => alert("💥 CRITICAL CHECKMATE! You Won Aura Battle Chess!"), 400);
                return;
            }
            
            document.getElementById('status').innerText = "Shadow AI thinking...";
            window.setTimeout(makeBotMove, 600);
        }

        function makeBotMove() {
            let moves = game.moves();
            if (moves.length === 0) return;
            let move = moves[Math.floor(Math.random() * moves.length)];
            
            let moveDetails = game.move(move);
            board.position(game.fen());
            
            if (moveDetails && moveDetails.captured) { captureSound.play().catch(()=>{}); }
            else { moveSound.play().catch(()=>{}); }

            if (game.in_checkmate()) {
                finalSlashAudio.play().catch(()=>{});
                $('#chessArena').addClass('shake-effect');
                document.getElementById('status').innerText = "💥 SHADOW AI WON!";
                return;
            }

            document.getElementById('status').innerText = "Your Turn - White Warriors";
        }
    </script>
</body>
</html>
