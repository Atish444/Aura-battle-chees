<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA BATTLE CHESS | Epic Anime Arena</title>
    
    <!-- ♟️ Core Chess Engines -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root {
            --aura-red: 0 0 25px #ff0000, 0 0 50px #990000;
            --aura-gold: 0 0 25px #ffd700, 0 0 50px #ff6600;
            --aura-blue: 0 0 25px #00d2ff, 0 0 50px #006699;
        }
        
        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a0000 0%, #030000 70%, #000000 100%);
            color: #fff;
            font-family: 'Impact', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* 📺 Google Ads Space */
        .ad-banner {
            background: #0d0d0d;
            border: 1px dashed #ff2a2a;
            padding: 10px;
            font-size: 11px;
            color: #ff6666;
            max-width: 90%;
            margin: 10px auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        /* 👑 Top Bar Profile */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid #ff2a2a;
            background: linear-gradient(180deg, rgba(255, 0, 0, 0.1) 0%, transparent 100%);
        }

        .coins-box {
            color: #ffd700;
            font-size: 16px;
            text-shadow: var(--aura-gold);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #ffd700;
        }

        /* 🏠 Home Page UI */
        .main-menu {
            margin-top: 35px;
            padding: 0 15px;
            text-align: center;
        }
        
        h1 {
            font-size: 38px;
            margin: 0;
            text-shadow: var(--aura-red);
            letter-spacing: 2px;
            font-style: italic;
        }
        
        @media (min-width: 768px) {
            h1 { font-size: 52px; }
        }

        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            color: #ff6666;
            letter-spacing: 2px;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* 🔥 Dynamic GFX Buttons */
        .menu-btn {
            font-family: 'Impact', sans-serif;
            background: linear-gradient(45deg, #cc0000, #4a0000);
            color: white;
            border: 2px solid #ff2a2a;
            padding: 15px 40px;
            font-size: 18px;
            margin: 12px auto;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
            transition: all 0.2s ease-in-out;
            display: block;
            width: 85%;
            max-width: 300px;
        }
        
        .menu-btn:hover, .menu-btn:active {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: var(--aura-red);
        }
        
        .earn-btn {
            background: linear-gradient(45deg, #cc9900, #332200);
            border-color: #ffd700;
        }
        .earn-btn:hover { box-shadow: var(--aura-gold); }

        /* ⏳ Cinematic Full-Screen Ad Loader */
        .loading-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .glitch-text {
            font-size: 28px;
            color: #ff2a2a;
            text-shadow: var(--aura-red);
            animation: flash 0.2s infinite;
        }

        /* ♟️ Tilted 3D Battleground Arena */
        .game-zone {
            display: none;
            margin: 15px auto;
            width: 92%;
            max-width: 390px;
            background: rgba(10, 0, 0, 0.95);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ff2a2a;
            box-shadow: var(--aura-red);
            box-sizing: border-box;
            transform: rotateX(12deg) rotateY(0deg);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 🫨 Zoom In/Out & Color Shake Triggers */
        .zoom-red-flash { animation: redFlash 0.4s ease-out; box-shadow: var(--aura-red); }
        .zoom-yellow-flash { animation: yellowFlash 0.4s ease-out; box-shadow: var(--aura-gold); }
        .zoom-blue-flash { animation: blueFlash 0.4s ease-out; box-shadow: var(--aura-blue); }

        #myBoard {
            width: 100%;
            margin: 0 auto 15px auto;
            border: 5px solid #111;
        }

        /* Anime Dark Board Colors */
        .black-3c85d { background-color: #3d0000 !important; }
        .white-1e1d7 { background-color: #1c1c1c !important; }

        /* ⚔️ The Final Slash Split-Piece CSS styling */
        .split-dead-piece {
            position: relative;
            animation: splitCut 0.8s forwards;
        }

        /* Animations Dynamic Engine */
        @keyframes redFlash {
            0% { transform: rotateX(12deg) scale(1); }
            50% { transform: rotateX(12deg) scale(1.1); background-color: rgba(255,0,0,0.4); }
            100% { transform: rotateX(12deg) scale(1); }
        }
        @keyframes yellowFlash {
            0% { transform: rotateX(12deg) scale(1); }
            50% { transform: rotateX(12deg) scale(1.08); background-color: rgba(255,215,0,0.3); }
            100% { transform: rotateX(12deg) scale(1); }
        }
        @keyframes blueFlash {
            0% { transform: rotateX(12deg) scale(1); }
            50% { transform: rotateX(12deg) scale(1.08); background-color: rgba(0,210,255,0.3); }
            100% { transform: rotateX(12deg) scale(1); }
        }
        @keyframes splitCut {
            0% { opacity: 1; transform: scale(1.2); filter: brightness(3); }
            40% { transform: scale(1.1) skewX(-20deg); clip-path: polygon(0 0, 100% 0, 0 100%); }
            100% { opacity: 0; transform: translate(-30px, 30px) rotate(-30deg); filter: blur(5px); }
        }
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- 📺 ADS -->
    <div class="ad-banner">⚡ [ AdSense Active - Smart Banner Space ] ⚡</div>

    <!-- 👑 PROFILE BAR -->
    <div class="top-bar">
        <div style="font-size: 15px;">👤 PLAYER: <span style="color: #ff2a2a; font-weight: bold;">ATISH</span></div>
        <div class="coins-box">🪙 COINS: <span id="coinCounter">100</span></div>
    </div>

    <!-- ⏳ FULL REEL VIDEO AD OVERLAY -->
    <div class="loading-screen" id="loader">
        <div class="glitch-text">⚡ CINEMATIC AD RUNNING ⚡</div>
        <p style="color: #444; letter-spacing: 4px; font-size: 11px; margin-top: 10px;">LOADING AURA ENGINE SHADERS</p>
    </div>

    <!-- 🏠 MAIN MENU -->
    <div class="main-menu" id="menuScene">
        <h1>⚔️ AURA BATTLE CHESS ⚔️</h1>
        <p class="subtitle">Ultimate GFX & Shaders Edit</p>

        <div style="margin-top: 40px;">
            <button class="menu-btn" onclick="startBattleground()">BATTLE VS AI 🤖</button>
            <button class="menu-btn" onclick="alert('Connecting Servers... Syncing Cross-Platform Room!')">PLAY ONLINE 🌎</button>
            <button class="menu-btn earn-btn" onclick="watchCinematicAd()">🎬 WATCH AD (FREE 50 COINS)</button>
        </div>
    </div>

    <!-- ♟️ INTERACTIVE BATTLEFIELD -->
    <div class="game-zone" id="chessArena">
        <h3 style="color: #ffd700; margin: 0 0 12px 0; letter-spacing: 2px;">⚡ BATTLE LIVE ⚡</h3>
        <div id="myBoard"></div>
        <p id="status" style="font-size: 14px; color: #ff5555; font-style: italic; margin-bottom: 10px; font-family: sans-serif;"></p>
        <button class="menu-btn" style="padding: 8px 20px; font-size: 14px; margin: 0 auto;" onclick="backToMainHub()">SURRENDER</button>
    </div>

    <script>
        // 🎵 EPIC ANIME SOUND INTEGRATION LINKS
        const moveSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav'); 
        const captureSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2763/2763-84.wav'); 
        const finalSlashAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1188/1188-84.wav'); 

        let userCoins = 100;

        function watchCinematicAd() {
            document.getElementById("loader").style.display = "flex";
            setTimeout(function() {
                document.getElementById("loader").style.display = "none";
                userCoins += 50;
                document.getElementById("coinCounter").innerText = userCoins;
                alert("🎉 Ad Finished! 50 Coins added to ATISH's wallet.");
            }, 3000);
        }

        let board = null;
        let game = new Chess();
        const $arena = $('#chessArena');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false; 
        }

        function triggerFlashZoom(colorClass) {
            $arena.addClass(colorClass);
            setTimeout(() => $arena.removeClass(colorClass), 400);
        }

        function makeBotMove () {
            let possibleMoves = game.moves({ verbose: true });
            
            if (game.game_over()) {
                handleMatchEndLogic();
                return;
            }

            let randomIdx = Math.floor(Math.random() * possibleMoves.length);
            let move = possibleMoves[randomIdx];
            
            game.move(move);
            board.position(game.fen());
            
            if (move.captured) {
                captureSound.play();
                triggerFlashZoom('zoom-red-flash'); 
            } else {
                moveSound.play();
                triggerFlashZoom('zoom-blue-flash'); 
            }
            updateStatus();
        }

        function onDrop (source, target) {
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            if (move.captured) {
                captureSound.play();
                triggerFlashZoom('zoom-yellow-flash'); 
            } else {
                moveSound.play();
                triggerFlashZoom('zoom-blue-flash');
            }

            window.setTimeout(makeBotMove, 700); 
            updateStatus();
        }

        function handleMatchEndLogic() {
            if (game.in_checkmate()) {
                finalSlashAudio.play();
                $('.square-55d63 img').addClass('split-dead-piece');
                setTimeout(() => {
                    alert("💥 CRITICAL CHECKMATE! Final Warrior piece cut in half. You Won Aura Battle Chess!");
                }, 800);
            }
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            let statusText = '';
            let turnColor = (game.turn() === 'b') ? 'Shadow AI' : 'White Warrior';

            if (game.in_checkmate()) {
                statusText = '💥 MATCH OVER - CRITICAL ELIMINATION!';
                handleMatchEndLogic();
            } else {
                statusText = turnColor + ' is ready to charge...';
                if (game.in_check()) {
                    statusText += ' ⚠️ IN CHECK (CRITICAL WARNING)!';
                }
            }
            $('#status').html(statusText);
        }

        function startBattleground() {
            document.getElementById("menuScene").style.display = "none";
            document.getElementById("chessArena").style.display = "block";
            game.reset();
            
            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                animateMove: true,
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            });
            $(window).resize(board.resize); 
            updateStatus();
        }

        function backToMainHub() {
            document.getElementById("chessArena").style.display = "none";
            document.getElementById("menuScene").style.display = "block";
        }
    </script>
</body>
</html>
